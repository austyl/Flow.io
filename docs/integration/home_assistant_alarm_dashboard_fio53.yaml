title: Flow.IO Alarms
views:
  - title: Alarmes
    path: flowio-alarmes
    icon: mdi:alarm-light
    cards:
      - type: markdown
        content: |
          # Flow.IO alarms
          Une ligne par alarme, avec 3 indicateurs a droite: `active`, `ack`, `condition`.

      - type: grid
        columns: 4
        square: false
        cards:
          - type: button
            entity: binary_sensor.fio53_psi_low_active
            name: Low pressure
            icon: mdi:gauge-empty
            show_state: false
            state_color: true
            tap_action:
              action: more-info
            hold_action:
              action: more-info
          - type: button
            entity: binary_sensor.fio53_psi_low_active
            name: Active
            icon: mdi:alarm-light
            show_state: false
            state_color: true
            tap_action:
              action: none
            hold_action:
              action: more-info
          - type: button
            entity: binary_sensor.fio53_psi_low_acked
            name: Ack
            icon: mdi:check-circle-outline
            show_state: false
            state_color: true
            tap_action:
              action: none
            hold_action:
              action: more-info
          - type: button
            entity: binary_sensor.fio53_psi_low_condition
            name: Cond
            icon: mdi:flash-alert
            show_state: false
            state_color: true
            tap_action:
              action: none
            hold_action:
              action: more-info

